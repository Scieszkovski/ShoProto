<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModernShop</title>
    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary: #2563ec;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
            --white: #ffffff;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--light); color: var(--dark); line-height: 1.6; }

        /* Navigation */
        nav {
            background: var(--white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); cursor: pointer; }
        .nav-links button {
            background: none;
            border: none;
            margin-left: 1rem;
            cursor: pointer;
            font-size: 1rem;
            color: var(--gray);
            transition: color 0.2s;
        }
        .nav-links button:hover, .nav-links button.active { color: var(--primary); font-weight: bold; }
        .cart-icon { position: relative; }
        .cart-count { 
            position: absolute; top: -8px; right: -8px; 
            background: red; color: white; font-size: 0.7rem; 
            padding: 2px 6px; border-radius: 50%; 
        }

        /* Layout Containers */
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .view-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .view-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* VIEW 1: MAIN PAGE (Product Grid) */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .product-card:hover { transform: translateY(-5px); }
        .card-img { height: 200px; background-color: #ddd; display: flex; align-items: center; justify-content: center; color: #888; }
        .card-body { padding: 1rem; }
        .card-title { font-size: 1.1rem; margin-bottom: 0.5rem; }
        .card-price { color: var(--primary); font-weight: bold; font-size: 1.2rem; }
        .btn-add {
            width: 100%;
            padding: 0.5rem;
            background: var(--dark);
            color: white;
            border: none;
            margin-top: 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-add:hover { background: var(--primary); }

        /* VIEW 2: PRODUCT DETAILS */
        .product-detail-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            background: var(--white);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .detail-image { height: 400px; background: #eee; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #ccc; }
        .detail-info h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .detail-price { font-size: 2rem; color: var(--primary); margin-bottom: 1.5rem; }
        .detail-desc { color: var(--gray); margin-bottom: 2rem; }
        .action-buttons { display: flex; gap: 1rem; }
        .btn-primary { padding: 0.8rem 2rem; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        .btn-secondary { padding: 0.8rem 2rem; background: transparent; border: 2px solid var(--dark); color: var(--dark); border-radius: 4px; cursor: pointer; font-size: 1rem; }

        /* VIEW 3: REVIEWS */
        .reviews-container { max-width: 800px; margin: 0 auto; }
        .review-card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
        }
        .review-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
        .stars { color: #fbbf24; }
        .review-form textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 1rem;
            resize: vertical;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .product-detail-wrapper { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="logo" onclick="router('home')">ModernShop</div>
        <div class="nav-links">
            <button onclick="router('home')" id="nav-home" class="active">Home</button>
            <button onclick="router('product')" id="nav-product">Product</button>
            <button onclick="router('reviews')" id="nav-reviews">Reviews</button>
            <button class="cart-icon">
                🛒 <span class="cart-count">0</span>
            </button>
        </div>
    </nav>

    <div class="container">
        
        <!-- VIEW 1: Main Page -->
        <section id="view-home" class="view-section active">
            <h2 style="margin-bottom: 1.5rem;">Featured Products</h2>
            <div class="product-grid" id="product-grid">
                <!-- Products injected via JS -->
            </div>
        </section>

        <!-- VIEW 2: Product Details -->
        <section id="view-product" class="view-section">
            <button onclick="router('home')" style="margin-bottom: 1rem; border:none; background:none; cursor:pointer; color:var(--gray)">← Back to Shop</button>
            <div class="product-detail-wrapper">
                <div class="detail-image" id="p-image">📷</div>
                <div class="detail-info">
                    <h1 id="p-title">Product Name</h1>
                    <div class="detail-price" id="p-price">$0.00</div>
                    <p class="detail-desc" id="p-desc">Description goes here.</p>
                    
                    <div class="action-buttons">
                        <button class="btn-primary" onclick="addToCart()">Add to Cart</button>
                        <button class="btn-secondary" onclick="router('reviews')">Read Reviews</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- VIEW 3: Reviews -->
        <section id="view-reviews" class="view-section">
            <div class="reviews-container">
                <h2 style="margin-bottom: 1.5rem;">Customer Reviews</h2>
                
                <!-- Review List -->
                <div id="reviews-list">
                    <!-- Reviews injected via JS -->
                </div>

                <!-- Add Review Form -->
                <div style="margin-top: 3rem; background: white; padding: 2rem; border-radius: 8px;">
                    <h3>Write a Review</h3>
                    <form onsubmit="handleReviewSubmit(event)" style="margin-top: 1rem;">
                        <textarea rows="4" placeholder="Share your experience..." required></textarea>
                        <button type="submit" class="btn-primary">Submit Review</button>
                    </form>
                </div>
            </div>
        </section>

    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */

        // Mock Data
        const products = [
            { id: 1, title: "Wireless Headphones", price: 199.99, desc: "High-fidelity audio with noise cancellation.", image: "🎧" },
            { id: 2, title: "Smart Watch", price: 249.50, desc: "Track your fitness and stay connected.", image: "⌚" },
            { id: 3, title: "Mechanical Keyboard", price: 120.00, desc: "Tactile switches for the ultimate typing experience.", image: "⌨️" },
            { id: 4, title: "Gaming Mouse", price: 59.99, desc: "Precision tracking and customizable RGB lighting.", image: "🖱️" }
        ];

        let cartCount = 0;
        let currentProduct = products[0]; // Default selected product

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderGrid();
            loadProductDetails(currentProduct);
            renderReviews();
        });

        // Router Function (Switches Views)
        function router(viewName) {
            // Hide all sections
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-links button').forEach(el => el.classList.remove('active'));

            // Show target section
            document.getElementById(`view-${viewName}`).classList.add('active');
            
            // Update Nav State
            const navBtn = document.getElementById(`nav-${viewName}`);
            if(navBtn) navBtn.classList.add('active');

            // Scroll to top
            window.scrollTo(0,0);
        }

        // Render Home Grid
        function renderGrid() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card" onclick="openProduct(${p.id})">
                    <div class="card-img">${p.image}</div>
                    <div class="card-body">
                        <div class="card-title">${p.title}</div>
                        <div class="card-price">$${p.price.toFixed(2)}</div>
                        <button class="btn-add" onclick="event.stopPropagation(); addToCart()">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        // Open Specific Product
        function openProduct(id) {
            currentProduct = products.find(p => p.id === id);
            loadProductDetails(currentProduct);
            router('product');
        }

        // Load Data into Product View
        function loadProductDetails(product) {
            document.getElementById('p-title').innerText = product.title;
            document.getElementById('p-price').innerText = `$${product.price.toFixed(2)}`;
            document.getElementById('p-desc').innerText = product.desc;
            document.getElementById('p-image').innerText = product.image;
        }

        // Cart Logic
        function addToCart() {
            cartCount++;
            document.querySelector('.cart-count').innerText = cartCount;
            alert(`${currentProduct.title} added to cart!`);
        }

        // Reviews Logic
        const mockReviews = [
            { user: "Alice M.", rating: 5, text: "Absolutely love this product! Quality is top notch." },
            { user: "John D.", rating: 4, text: "Great value for money, shipping was fast." }
        ];

        function renderReviews() {
            const list = document.getElementById('reviews-list');
            list.innerHTML = mockReviews.map(r => `
                <div class="review-card">
                    <div class="review-header">
                        <strong>${r.user}</strong>
                        <span class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                    </div>
                    <p>${r.text}</p>
                </div>
            `).join('');
        }

        function handleReviewSubmit(e) {
            e.preventDefault();
            const text = e.target.querySelector('textarea').value;
            
            // Add new review to top of list
            mockReviews.unshift({
                user: "You",
                rating: 5,
                text: text
            });
            
            renderReviews();
            e.target.reset();
            alert("Review submitted successfully!");
        }
    </script>
</body>
</html>
